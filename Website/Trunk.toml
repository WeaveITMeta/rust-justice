[build]
target = "index.html"
dist = "dist"

[watch]
watch = ["src", "index.html", "input.css"]
ignore = ["dist", "node_modules"]

[serve]
address = "127.0.0.1"
port = 8080
open = false

[[hooks]]
stage = "pre_build"
command = "sh"
command_arguments = ["-c", "bunx tailwindcss -i ./input.css -o ./style.css --minify"]
